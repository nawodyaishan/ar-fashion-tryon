<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>Simple Garment Try-On</title>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    <style>
        body {
            font-family: system-ui, Arial, sans-serif;
            margin: 20px;
            max-width: 980px;
        }

        h1 {
            margin-bottom: 0.25rem;
        }

        .card {
            border: 1px solid #ccc;
            border-radius: 12px;
            padding: 16px;
            margin: 14px 0;
        }

        .row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .col {
            flex: 1 1 320px;
        }

        .preview {
            max-width: 100%;
            border: 1px dashed #bbb;
            border-radius: 8px;
            padding: 8px;
        }

        button {
            padding: 10px 16px;
            border-radius: 8px;
            border: 0;
            background: #0d6efd;
            color: white;
            cursor: pointer;
        }

        button.secondary {
            background: #6c757d;
        }

        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 8px;
            background: #eee;
            margin-left: 8px;
        }

        #cameraArea video, #cameraArea canvas {
            width: 100%;
            max-width: 420px;
            border-radius: 8px;
        }

        .hidden {
            display: none;
        }

        .error {
            color: #b00020;
            font-weight: 600;
        }

        .ok {
            color: #0c7a2f;
            font-weight: 600;
        }

        .thin {
            color: #666;
        }
    </style>
</head>
<body>
<h1>Garment Try-On (T-Shirt / Trousers)</h1>
<p class="thin">1) Upload a garment image → 2) If valid, upload or capture your body image → 3) Get a composed
    try-on.</p>

<!-- Step 1: Garment upload & classification -->
<div class="card">
    <h2>Step 1 — Upload Garment</h2>
    <form enctype="multipart/form-data" id="garmentForm">
        <input accept="image/*" name="garment" required type="file"/>
        <button type="submit">Classify & Remove Background</button>
    </form>
    <div id="garmentResult" style="margin-top:10px;"></div>
    <div class="row" style="margin-top:10px;">
        <div class="col"><img alt="Garment preview" class="preview hidden" id="garmentPreview"/></div>
        <div class="col"><img alt="Garment cutout" class="preview hidden" id="cutoutPreview"/></div>
    </div>
</div>

<!-- Step 2: Body upload or camera -->
<div class="card">
    <h2>Step 2 — Provide Body Image</h2>
    <div class="row">
        <div class="col">
            <h3>Upload from device</h3>
            <form enctype="multipart/form-data" id="bodyForm">
                <input accept="image/*" name="body" type="file"/>
                <!-- NEW: hidden field to carry cutout_path -->
                <input id="cutoutPathInput" name="cutout_path" type="hidden"/>
                <button type="submit">Try-On with Uploaded Body Image</button>
            </form>
        </div>
        <div class="col">
            <h3>Or use camera</h3>
            <div id="cameraArea">
                <video autoplay class="hidden" id="video" playsinline></video>
                <canvas class="hidden" id="snapshot"></canvas>
                <div style="display:flex; gap:8px; margin-top:8px;">
                    <button id="startCam" type="button">Start Camera</button>
                    <button class="secondary hidden" id="capture" type="button">Capture</button>
                    <button class="hidden" id="sendCapture" type="button">Try-On with Capture</button>
                </div>
            </div>
        </div>
    </div>
    <div id="composeStatus" style="margin-top:10px;"></div>
    <div style="margin-top:10px;">
        <img alt="Try-on result" class="preview hidden" id="resultPreview"/>
    </div>
</div>

<script>
    // --- Step 1: Garment upload ---
    const garmentForm = document.getElementById('garmentForm');
    const garmentResult = document.getElementById('garmentResult');
    const garmentPreview = document.getElementById('garmentPreview');
    const cutoutPreview = document.getElementById('cutoutPreview');
    const cutoutPathInput = document.getElementById('cutoutPathInput');

    garmentForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        garmentResult.innerHTML = 'Processing garment...';
        const formData = new FormData(garmentForm);
        try {
            const res = await fetch('/classify_garment', {method: 'POST', body: formData});
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Unknown error');

            garmentResult.innerHTML = `Detected: <b>${data.label.toUpperCase()}</b> <span class="tag">conf ${Math.round(data.confidence * 100)}%</span>`;
            garmentPreview.src = data.garment_url;
            garmentPreview.classList.remove('hidden');
            cutoutPreview.src = data.cutout_url;
            cutoutPreview.classList.remove('hidden');

            // Save to both sessionStorage and hidden input so ALL flows have it
            window.sessionStorage.setItem('cutoutPath', data.cutout_path);
            cutoutPathInput.value = data.cutout_path; // <-- ensures it's sent in the upload form
        } catch (err) {
            garmentResult.innerHTML = `<span class="error">${err.message}</span>`;
            garmentPreview.classList.add('hidden');
            cutoutPreview.classList.add('hidden');
            cutoutPathInput.value = '';
            window.sessionStorage.removeItem('cutoutPath');
        }
    });

    // --- Step 2: Body upload file ---
    const bodyForm = document.getElementById('bodyForm');
    const composeStatus = document.getElementById('composeStatus');
    const resultPreview = document.getElementById('resultPreview');

    async function sendTryOn(bodyBlobOrFormData) {
        composeStatus.textContent = 'Creating try-on...';
        try {
            let res;
            if (bodyBlobOrFormData instanceof FormData) {
                // ensure cutout_path present even if user navigated oddly
                if (!bodyBlobOrFormData.get('cutout_path')) {
                    const fromSession = window.sessionStorage.getItem('cutoutPath');
                    if (fromSession) bodyBlobOrFormData.append('cutout_path', fromSession);
                }
                res = await fetch('/try_on', {method: 'POST', body: bodyBlobOrFormData});
            } else {
                const fd = new FormData();
                fd.append('body', bodyBlobOrFormData, 'capture.png');
                const cp = window.sessionStorage.getItem('cutoutPath');
                if (!cp) throw new Error('Please finish Step 1 first.');
                fd.append('cutout_path', cp); // <-- include cutout for camera flow
                res = await fetch('/try_on', {method: 'POST', body: fd});
            }
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Unknown error');
            resultPreview.src = data.result_url;
            resultPreview.classList.remove('hidden');
            composeStatus.innerHTML = `<span class="ok">Done.</span>`;
        } catch (err) {
            composeStatus.innerHTML = `<span class="error">${err.message}</span>`;
            resultPreview.classList.add('hidden');
        }
    }

    bodyForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const hasCutout = cutoutPathInput.value || window.sessionStorage.getItem('cutoutPath');
        if (!hasCutout) {
            composeStatus.innerHTML = '<span class="error">Please finish Step 1 first.</span>';
            return;
        }
        const fd = new FormData(bodyForm);
        await sendTryOn(fd);
    });

    // --- Step 2B: Camera capture ---
    const video = document.getElementById('video');
    const snapshot = document.getElementById('snapshot');
    const startCam = document.getElementById('startCam');
    const capture = document.getElementById('capture');
    const sendCapture = document.getElementById('sendCapture');

    startCam.addEventListener('click', async () => {
        if (!navigator.mediaDevices?.getUserMedia) {
            alert('Camera not supported in this browser.');
            return;
        }
        const stream = await navigator.mediaDevices.getUserMedia({video: true});
        video.srcObject = stream;
        video.classList.remove('hidden');
        capture.classList.remove('hidden');
        sendCapture.classList.add('hidden');
        snapshot.classList.add('hidden');
    });

    capture.addEventListener('click', () => {
        snapshot.width = video.videoWidth;
        snapshot.height = video.videoHeight;
        snapshot.getContext('2d').drawImage(video, 0, 0);
        snapshot.classList.remove('hidden');
        sendCapture.classList.remove('hidden');
    });

    sendCapture.addEventListener('click', async () => {
        const cp = window.sessionStorage.getItem('cutoutPath');
        if (!cp) {
            composeStatus.innerHTML = '<span class="error">Please finish Step 1 first.</span>';
            return;
        }
        snapshot.toBlob(async (blob) => {
            await sendTryOn(blob);
        }, 'image/png', 0.95);
    });
</script>
</body>
</html>
